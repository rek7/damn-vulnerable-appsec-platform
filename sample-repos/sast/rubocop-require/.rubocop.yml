# Assessment fixture: .rubocop.yml whose `require:` loads Ruby at startup.
#
# Real behavior abused
# --------------------
# RuboCop's `require:` directive `require`s the named Ruby files when it boots --
# it's meant for loading custom cops/extensions. RuboCop runs the require BEFORE
# inspecting any code, so a repo that ships its own .rubocop.yml gets arbitrary
# Ruby execution inside the linter the moment it is scanned with config
# auto-discovery on (the default).
#
# Containment: the required file only signals to the
# __DVAP_LISTENER_HOST__ placeholder. No external host appears here.
require:
  - ./repository_rule.rb

AllCops:
  NewCops: disable
