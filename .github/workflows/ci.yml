# DVAP — CI Pipeline (SPEC §12, CONTRACTS §2)
#
# Pipeline stages (sequential, each stage gates the next):
#   1. lint-python   — ruff + black check for api, worker, listener
#   2. typecheck-python — mypy strict for api, worker, listener
#   3. test-python   — pytest for api, worker, listener
#   4. lint-frontend — eslint + prettier for frontend
#   5. typecheck-frontend — tsc --noEmit for frontend
#   6. test-frontend — vitest for frontend
#   7. build-images  — docker build all four service images
#   8. e2e           — full stack compose + e2e harness

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Python lint (ruff + black)
  # ---------------------------------------------------------------------------
  lint-python:
    name: Lint Python (ruff + black)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, listener]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff black

      - name: ruff — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: ruff check .

      - name: black check — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: black --check .

  # ---------------------------------------------------------------------------
  # 2. Python type check (mypy strict)
  # ---------------------------------------------------------------------------
  typecheck-python:
    name: Type check Python (mypy)
    runs-on: ubuntu-latest
    needs: lint-python
    strategy:
      matrix:
        service: [api, worker, listener]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + mypy
        working-directory: ${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install mypy

      - name: mypy — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mypy .

  # ---------------------------------------------------------------------------
  # 3. Python tests (pytest)
  # ---------------------------------------------------------------------------
  test-python:
    name: Test Python (pytest)
    runs-on: ubuntu-latest
    needs: typecheck-python
    strategy:
      matrix:
        service: [api, worker, listener]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: pytest — ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: pytest -v --tb=short

  # ---------------------------------------------------------------------------
  # 4. Frontend lint (eslint + prettier)
  # ---------------------------------------------------------------------------
  lint-frontend:
    name: Lint frontend (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: eslint
        working-directory: frontend
        run: npm run lint

      - name: prettier check
        working-directory: frontend
        run: npm run format:check

  # ---------------------------------------------------------------------------
  # 5. Frontend type check (tsc --noEmit)
  # ---------------------------------------------------------------------------
  typecheck-frontend:
    name: Type check frontend (tsc)
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: tsc --noEmit
        working-directory: frontend
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # 6. Frontend tests (vitest)
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test frontend (vitest)
    runs-on: ubuntu-latest
    needs: typecheck-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: vitest
        working-directory: frontend
        run: npm run test -- --run

  # ---------------------------------------------------------------------------
  # 7. Build Docker images
  # ---------------------------------------------------------------------------
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        run: docker build -t dvap-frontend:ci ./frontend

      - name: Build api image
        run: docker build -t dvap-api:ci ./api

      - name: Build worker image
        # Worker build context is repo root (hosts seeds/ + worker/)
        run: docker build -t dvap-worker:ci -f worker/Dockerfile .

      - name: Build listener image
        run: docker build -t dvap-listener:ci ./listener

      - name: Validate compose config
        run: docker compose config --quiet

  # ---------------------------------------------------------------------------
  # 8. End-to-end tests (compose + e2e harness)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4

      - name: Start stack + run e2e
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml \
            up --build --abort-on-container-exit --exit-code-from e2e

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml \
            down --volumes --remove-orphans
