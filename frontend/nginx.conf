# nginx serves the static Vite build and reverse-proxies /api (REST + the
# /api/stream websocket upgrade) to the api service inside the compose network.
#
# proxy_pass uses a variable + the Docker embedded DNS resolver (127.0.0.11) so
# the `api` hostname is resolved per-request instead of at startup. That lets the
# frontend container boot even if `api` is not up yet (no hard ordering needed),
# and picks up `api`'s address if it changes.
server {
    listen 80;
    server_name _;

    # Docker's embedded DNS. valid= keeps re-resolving so a restarted api is seen.
    resolver 127.0.0.11 ipv6=off valid=10s;

    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # WebSocket upgrade for the live stream. Declared before the generic /api
    # block so it takes precedence for the stream path.
    location /api/stream {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # REST API.
    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Allow larger archive uploads (api enforces its own limit).
        client_max_body_size 25m;
    }

    # Real static HTML files are served directly. Missing .html paths return 404
    # instead of falling through to the SPA router.
    location ~ \.html$ {
        try_files $uri =404;
    }

    # SPA fallback: everything else serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
